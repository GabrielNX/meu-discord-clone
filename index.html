<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Discord Clone - VoIP GitHub</title>
    <!-- Importação Direta -->
    <script src="https://unpkg.com"></script>
    <style>
        body { margin: 0; background: #313338; color: white; font-family: sans-serif; display: flex; height: 100vh; }
        .sidebar { width: 280px; background: #2b2d31; padding: 20px; border-right: 1px solid #1e1f22; display: flex; flex-direction: column; gap: 15px; }
        .btn { padding: 12px; border: none; border-radius: 4px; color: white; font-weight: bold; cursor: pointer; background: #23a559; }
        input { padding: 10px; border-radius: 4px; border: none; background: #1e1f22; color: white; outline: none; margin-bottom: 10px; }
        #status { font-size: 12px; color: #b9bbbe; text-align: center; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h3 style="margin:0">CANAL DE VOZ</h3>
        <div id="status">CONECTANDO...</div>
        
        <label style="font-size: 11px;">SEU ID:</label>
        <input type="text" id="my-id" readonly>

        <label style="font-size: 11px;">ID DO AMIGO:</label>
        <input type="text" id="friend-id">
        <button id="call-btn" class="btn">ENTRAR NA VOZ</button>
    </div>

    <div style="flex:1; padding:20px;" id="chat-log">
        <div style="color: #949ba4;">> Sistema pronto.</div>
    </div>

    <audio id="remote-audio" autoplay></audio>

    <script>
        const chatLog = document.getElementById('chat-log');
        function log(msg) { chatLog.innerHTML += `<div style="margin-bottom:5px">> ${msg}</div>`; }

        // Inicialização sem parâmetros (Usa o Cloud do PeerJS automaticamente)
        let peer;

        function startPeer() {
            if (typeof Peer === 'undefined') {
                setTimeout(startPeer, 500);
                return;
            }

            // MUDANÇA AQUI: Sem configurações complexas para evitar erro de host
            peer = new Peer();

            peer.on('open', (id) => {
                document.getElementById('my-id').value = id;
                document.getElementById('status').innerText = "ONLINE";
                document.getElementById('status').style.color = "#23a559";
                log("Conectado! Seu ID é: " + id);
            });

            peer.on('error', (err) => {
                log("Erro: " + err.type);
                console.error(err);
            });

            // RECEBER CHAMADA
            peer.on('call', (call) => {
                log("Recebendo chamada...");
                navigator.mediaDevices.getUserMedia({ audio: true }).then((stream) => {
                    call.answer(stream);
                    call.on('stream', (remoteStream) => {
                        document.getElementById('remote-audio').srcObject = remoteStream;
                        log("Áudio do amigo conectado!");
                    });
                });
            });

            // INICIAR CHAMADA
            document.getElementById('call-btn').onclick = () => {
                const id = document.getElementById('friend-id').value;
                if(!id) return alert("Insira o ID!");
                
                log("Chamando " + id + "...");
                navigator.mediaDevices.getUserMedia({ audio: true }).then((stream) => {
                    const call = peer.call(id, stream);
                    call.on('stream', (remoteStream) => {
                        document.getElementById('remote-audio').srcObject = remoteStream;
                        log("Chamada ativa!");
                    });
                }).catch(err => log("Erro microfone: " + err));
            };
        }

        startPeer();
    </script>
</body>
</html>
