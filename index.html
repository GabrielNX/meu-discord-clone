<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Discord Clone - VoIP Direto</title>
    <style>
        body { margin: 0; background: #313338; color: white; font-family: sans-serif; display: flex; height: 100vh; }
        .sidebar { width: 320px; background: #2b2d31; padding: 20px; display: flex; flex-direction: column; gap: 15px; border-right: 1px solid #1e1f22; }
        .status { padding: 10px; border-radius: 4px; text-align: center; font-weight: bold; background: #404249; color: #b9bbbe; }
        button { padding: 12px; border: none; border-radius: 4px; color: white; font-weight: bold; cursor: pointer; background: #5865f2; }
        button:hover { background: #4752c4; }
        textarea { width: 100%; height: 120px; background: #1e1f22; color: #dcddde; border: 1px solid #444; border-radius: 5px; padding: 8px; font-size: 10px; font-family: monospace; resize: none; outline: none; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h3 style="margin:0">VOIP DIRETO (P2P)</h3>
        <div id="status" class="status">SISTEMA PRONTO</div>
        
        <button id="btn-iniciar">1. CRIAR CHAMADA</button>
        <p style="font-size: 11px; margin:0">MEU CÓDIGO (Envie para o amigo):</p>
        <textarea id="meu-codigo" readonly></textarea>
        
        <hr style="border:0; border-top:1px solid #444;">

        <p style="font-size: 11px; margin:0">CÓDIGO DO AMIGO (Cole aqui):</p>
        <textarea id="codigo-amigo" placeholder="Cole o código dele aqui..."></textarea>
        <button id="btn-conectar" style="background: #23a559;">2. CONECTAR VOZ</button>
    </div>

    <div style="flex:1; padding:20px;">
        <div id="chat-log" style="color: #949ba4; font-size: 14px;">> Aguardando ação...</div>
    </div>

    <audio id="remote-audio" autoplay></audio>

    <script>
        const pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
        const remoteAudio = document.getElementById('remote-audio');
        const log = (m) => document.getElementById('chat-log').innerHTML += `<div>> ${m}</div>`;

        // Captura áudio do microfone
        async function getMic() {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            stream.getTracks().forEach(track => pc.addTrack(track, stream));
            return stream;
        }

        // Recebe o áudio do outro lado
        pc.ontrack = (event) => {
            remoteAudio.srcObject = event.streams[0];
            document.getElementById('status').innerText = "CONECTADO!";
            document.getElementById('status').style.color = "#23a559";
        };

        // PASSO 1: Criar a oferta (Gerar código)
        document.getElementById('btn-iniciar').onclick = async () => {
            await getMic();
            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            
            // Espera os candidatos ICE carregarem para gerar o código final
            pc.onicecandidate = (event) => {
                if (!event.candidate) {
                    document.getElementById('meu-codigo').value = btoa(JSON.stringify(pc.localDescription));
                    log("Código gerado! Envie para seu amigo.");
                }
            };
        };

        // PASSO 2: Conectar usando o código do amigo
        document.getElementById('btn-conectar').onclick = async () => {
            const rawCode = document.getElementById('codigo-amigo').value.trim();
            if (!rawCode) return alert("Cole o código!");

            const remoteDesc = new RTCSessionDescription(JSON.parse(atob(rawCode)));
            await pc.setRemoteDescription(remoteDesc);

            if (remoteDesc.type === "offer") {
                await getMic();
                const answer = await pc.createAnswer();
                await pc.setLocalDescription(answer);
                
                pc.onicecandidate = (event) => {
                    if (!event.candidate) {
                        document.getElementById('meu-codigo').value = btoa(JSON.stringify(pc.localDescription));
                        log("Resposta gerada! Mande este código de volta para seu amigo.");
                    }
                };
            } else {
                log("Conexão finalizada!");
            }
        };
    </script>
</body>
</html>
